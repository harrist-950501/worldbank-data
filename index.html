<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Data graphing</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="index.js"></script>
  </head>
  <body>
    <header>
      <img id="logo" src="logo.png" alt="A logo of a husky with author's name and slogen">
    </header>
    <main>
      <h1>Data graphing</h1>
      <section id="info-form">
        <h2>Set your parameters!</h2>
        <form>
          <label for="country-select">Choose a country:</label>
          <select id="country-select">
            <option value="CN">China</option>
            <option value="US">United States</option>
            <option value="JP">Japan</option>
            <option value="IN">India</option>
            <option value="ID">Indonesia</option>
            <option value="FR">France</option>
            <option value="BR">Brazil</option>
            <option value="other">Other...</option>
          </select>
          <!-- <br>
          <label for="indicator">Choose a indicator:</label>
          <select id="indicator">
            <option value="SP.POP.TOTL">Population</option>
            <option value="NY.GDP.MKTP.CD">GDP</option>
          </select>
          <br> -->
          <p class="hidden remind">Graping maximum reach!! Please reset</p>
          <section id="btn-container">
            <button id="generate-btn">Generate</button>
            <button id="reset-btn">Reset</button>
          </section>
        </form>
      </section>
      <h2>Here's your data!</h2>
      <section>
        <h3 id="error-page" class="hidden remind">
          Opps! The country has no record.
        </h3>
      <h3>Population and GDP chart</h3>
      <section id="chart-board">
        <canvas id="population-chart">
        </canvas>
        <canvas id="gdp-chart">
        </canvas>
      </section>
    </main>
    <footer>
      <p>© Harrist As a Husky 2025</p>
      <p>
        The data is provided by <em>World Bank</em> API:
        <br>
        <a href="https://datahelpdesk.worldbank.org/knowledgebase/topics/125589" target="_blank">
          The World Bank APIs
        </a>
      </p>
    </footer>
  </body>
</html>
